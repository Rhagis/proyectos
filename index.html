<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            var k = "theme";
            var t = null;
            try { t = localStorage.getItem(k); } catch (e) {}
            if (t === "light" || t === "dark") {
                document.documentElement.setAttribute("data-theme", t);
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
                document.documentElement.setAttribute("data-theme", "dark");
            } else {
                document.documentElement.setAttribute("data-theme", "light");
            }
        })();
    </script>
    <link rel="stylesheet" href="styles.css">
    <title>Mi Pagina</title>
</head>

<body>
    <main>
        <button type="button" id="theme-toggle" class="dark-mode" aria-label="Cambiar entre modo claro y oscuro"
            aria-pressed="false">
            <span class="dark-mode__icons" aria-hidden="true">
                <svg class="dark-mode__icon dark-mode__icon--sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    width="22" height="22" fill="currentColor">
                    <path
                        d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM11 1h2v3h-2V1zm0 19h2v3h-2v-3zM3.51 3.51l1.42 1.42 1.41-1.41-1.42-1.42zm12.02 12.02 1.41 1.41 1.42-1.41-1.41-1.41zM1 11v2h3v-2H1zm19 0v2h3v-2h-3zM4.93 18.36l1.41-1.41-1.42-1.42-1.41 1.41 1.42 1.42zM16.64 7.05l1.42-1.42-1.41-1.41-1.42 1.42 1.41 1.41z" />
                </svg>
                <svg class="dark-mode__icon dark-mode__icon--moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                    width="22" height="22" fill="currentColor">
                    <path d="M10 7a7 7 0 1 0 12 12 9 9 0 1 1-12-12z" />
                </svg>
            </span>
            <span class="dark-mode__label">Modo oscuro</span>
        </button>
        <header>
            <div class="header-foto">
                <img src="imagen 1.jpg" alt="">
            </div>
            <h1>Picasso Matias</h1>
        </header>
        <div class="datos">
            <section>
                <span class="numero">32</span>
                <span class="estad-texto"><i>años de edad</i></span>
            </section>
            <section>
                <span class="numero">9</span>
                <span class="estad-texto"><i>años de experiencia</i></span>
            </section>
            <section>
                <span class="numero">30</span>
                <span class="estad-texto"><i>juegos completados</i></span>
            </section>
        </div>
        <footer>
            <button type="button" class="btn-contacto">Contacto</button>
            <button type="button" class="btn-mas-info">Mas informacion</button>
        </footer>
    </main>
    <script src="theme.js"></script>
</body>

</html>
