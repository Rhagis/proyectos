<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Evita un destello: aplica el tema guardado antes de cargar estilos -->
    <script>
        var guardado = localStorage.getItem("theme");
        document.documentElement.setAttribute("data-theme", guardado === "dark" ? "dark" : "light");
    </script>
    <link rel="stylesheet" href="styles.css">
    <title>Mi Pagina</title>
</head>

<body>
    <main>
        <button type="button" id="theme-toggle" class="dark-mode" aria-label="Cambiar entre modo claro y oscuro">
            <span class="dark-mode__icon" aria-hidden="true"></span>
            <span class="dark-mode__label">Modo oscuro</span>
        </button>
        <header>
            <div class="header-foto">
                <img src="imagen 1.jpg" alt="">
            </div>
            <h1>Picasso Matias</h1>
        </header>
        <div class="datos">
            <section>
                <span id='edad' class="numero">32</span>
                <span class="estad-texto"><i>años de edad</i></span>
            </section>
            <section>
                <span id="exp" class="numero">9</span>
                <span class="estad-texto"><i>años de experiencia</i></span>
            </section>
            <section>
                <span id="game" class="numero">30</span>
                <span class="estad-texto"><i>juegos completados</i></span>
            </section>

        </div>
        <section>
            <div class="botones">
                <button class="btn-rojo">Rojo</button>
                <button type="button" class="btn-azul">Azul</button>
                <button type="button" class="btn-verde">Verde</button>
            </div>
        </section>
        <section>
            <form action="" class="inviform" novalidate>
                <div class="inviform__campo">
                    <label for="campo-edad">Edad</label>
                    <input type="text" class="age" id="campo-edad" name="edad" inputmode="numeric" autocomplete="off">
                </div>
                <div class="inviform__campo">
                    <label for="campo-exp">Experiencia</label>
                    <input type="text" class="exp" id="campo-exp" name="experiencia" inputmode="numeric" autocomplete="off">
                </div>
                <div class="inviform__campo">
                    <label for="campo-game">Juegos</label>
                    <input type="text" class="game" id="campo-game" name="juegos" inputmode="numeric" autocomplete="off">
                </div>
                <button type="submit" class="enviar">Enviar</button>
            </form>
        </section>
        <footer>
            <button type="button" class="btn-contacto">Contacto</button>
            <button type="button" class="btn-mas-info">Mas informacion</button>
            <button type="button" class="btn-modificar-datos">Modificar datos</button>
        </footer>
    </main>
    <script src="theme.js"></script>
</body>

</html>
